<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset='utf-8'>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="X-UA-Compatible" content="chrome=1">
    <meta name="description" content="Joel Saxton's personal site featuring an interactive solar system explorer.">
    <link rel="stylesheet" type="text/css" href="stylesheets/stylesheet.css" media="screen">
    <link rel="stylesheet" type="text/css" href="stylesheets/pygment_trac.css" media="screen">
    <link rel="stylesheet" type="text/css" href="stylesheets/planets.css" media="screen">
    <script src="javascripts/planets.js" defer></script>
    <script src="javascripts/main.js" defer></script>
    <title>Joel Saxton</title>
  </head>

  <body>

    <header>
      <div class="container">
        <h1>Joel Saxton</h1>
        <section id="downloads">
          <a href="starpatrol/index.html" style="display:block;margin-bottom:6px;">
            <img src="starpatrol/assets/images/logo.png" alt="Star Patrol" width="128" height="64" />
          </a>
          <a href="https://github.com/joelsaxton" class="btn btn-github" rel="noopener noreferrer"><span class="icon"></span>View on GitHub</a>
        </section>
      </div>
    </header>

    <div id="space"><div id="stars"></div></div>

    <div id="solar-system"></div>
    <div id="ui-panel">
        <div id="display">
            <select id="choose-system">
                <option class="system-option" value="Sol" selected="selected">SOL</option>
                <option class="system-option" value="HD-10180">HD-10180</option>
                <option class="system-option" value="Gliese-581">Gliese-581</option>
                <option class="system-option" value="TRAPPIST-1">TRAPPIST-1</option>
                <option class="system-option" value="HR-8799">HR 8799</option>
                <option class="system-option" value="Kepler-90">Kepler-90</option>
                <option class="system-option" value="55-Cancri">55 Cancri A</option>
                <option class="system-option" value="Upsilon-Andromedae">υ Andromedae</option>
                <option class="system-option" value="Random">Build Random</option>
                <option class="system-option" value="Custom">Custom System</option>
            </select>
        </div>
        <div id="custom-controls" style="display:none">
            <label for="planet-count">Planets</label>
            <select id="planet-count">
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5" selected="selected">5</option>
                <option value="6">6</option>
                <option value="7">7</option>
                <option value="8">8</option>
                <option value="9">9</option>
                <option value="10">10</option>
            </select>
            <label for="star-type">Star Type</label>
            <select id="star-type">
                <option value="red-dwarf">Red Dwarf</option>
                <option value="orange-dwarf">Orange Dwarf</option>
                <option value="yellow-dwarf" selected="selected">Yellow Dwarf</option>
                <option value="yellow-white">Yellow-White</option>
                <option value="white">White Star</option>
                <option value="blue-giant">Blue Giant</option>
                <option value="blue-supergiant">Blue Supergiant</option>
            </select>
        </div>
        <div id="controls">
            <label for="slider">Speed</label>
            <input id="slider" type="range" min="1" max="100" step="1" value="93" />
            <label for="zoom-slider">Zoom</label>
            <input id="zoom-slider" type="range" min="1" max="10" step="1" value="1" />
        </div>
    </div>
  </body>
</html>
